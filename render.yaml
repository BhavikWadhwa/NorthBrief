services:
  - type: web
    name: northbrief-api-bhavik
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: sh scripts/start.sh
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: autoflow-database
          property: connectionString
      - key: DB_SCHEMA
        value: northbrief
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://northbrief-web-bhavik.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: SUMMARIZATION_PROVIDER
        value: mock

  - type: web
    name: northbrief-web-bhavik
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20.18.1
      - key: NEXTAUTH_URL
        value: https://northbrief-web-bhavik.onrender.com
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_API_URL
        value: https://northbrief-api-bhavik.onrender.com/api/v1
      - key: INTERNAL_API_URL
        value: https://northbrief-api-bhavik.onrender.com/api/v1
