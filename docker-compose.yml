services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: northbrief
      POSTGRES_USER: northbrief
      POSTGRES_PASSWORD: northbrief
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://northbrief:northbrief@db:5432/northbrief
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      - db
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://northbrief:northbrief@db:5432/northbrief
    depends_on:
      - db
      - backend
    command: python -m app.worker

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./frontend/.env.example
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      INTERNAL_API_URL: http://backend:8000/api/v1
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me
    depends_on:
      - backend
    ports:
      - "3000:3000"
    command: npm run dev -- --hostname 0.0.0.0 --port 3000

volumes:
  pg_data:
